version: '3.8'

services:
  # ============================================
  # 1. REDIS - Cache Temps Réel
  # ============================================
  redis:
    image: redis:7.0-alpine
    container_name: hpis-redis
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-hpis2025}
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - hpis-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ============================================
  # 2. ZOOKEEPER (Nécessaire pour Kafka)
  # ============================================
  zookeeper:
    image: confluentinc/cp-zookeeper:7.4.0
    container_name: hpis-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    networks:
      - hpis-network
    restart: unless-stopped

  # ============================================
  # 3. KAFKA - Streaming & Ingestion
  # ============================================
  kafka:
    image: confluentinc/cp-kafka:7.4.0
    container_name: hpis-kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
      - "9093:9093"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092,PLAINTEXT_INTERNAL://kafka:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_INTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT_INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_LOG_RETENTION_HOURS: 168  # 7 jours
      KAFKA_LOG_SEGMENT_BYTES: 1073741824  # 1GB
    volumes:
      - kafka-data:/var/lib/kafka/data
    networks:
      - hpis-network
    restart: unless-stopped

  # ============================================
  # 4. RABBITMQ - Orchestration des Agents IA
  # ============================================
  rabbitmq:
    image: rabbitmq:3.12-management-alpine
    container_name: hpis-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-admin}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASS:-hpis2025}
      RABBITMQ_DEFAULT_VHOST: /
    ports:
      - "5672:5672"   # AMQP
      - "15672:15672" # Interface Web Management
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
      - ./rabbitmq/definitions.json:/etc/rabbitmq/definitions.json  # Optionnel : config pré-définie
    networks:
      - hpis-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ============================================
  # 5. CASSANDRA - Stockage Séries Temporelles
  # ============================================
  cassandra:
    image: cassandra:4.1.3
    container_name: hpis-cassandra
    environment:
      CASSANDRA_CLUSTER_NAME: "HPIS Cluster"
      CASSANDRA_DC: "datacenter1"
      CASSANDRA_RACK: "rack1"
      CASSANDRA_ENDPOINT_SNITCH: "GossipingPropertyFileSnitch"
      CASSANDRA_NUM_TOKENS: 256
      CASSANDRA_SEEDS: "cassandra"
    ports:
      - "9042:9042"  # CQL
      - "7000:7000"  # Intra-cluster
      - "7199:7199"  # JMX
    volumes:
      - cassandra-data:/var/lib/cassandra
    networks:
      - hpis-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "cqlsh", "-e", "describe keyspaces"]
      interval: 30s
      timeout: 10s
      retries: 5

# ============================================
# 6. VOLUMES PERSISTANTS
# ============================================
volumes:
  redis-data:
    driver: local
  kafka-data:
    driver: local
  rabbitmq-data:
    driver: local
  cassandra-data:
    driver: local

# ============================================
# 7. RÉSEAU DÉDIÉ
# ============================================
networks:
  hpis-network:
    driver: bridge
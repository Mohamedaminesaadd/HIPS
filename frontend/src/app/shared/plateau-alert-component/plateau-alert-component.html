<div class="plateau-alert">

    <div class="alert-icon">
        <mat-icon>arrow_forward</mat-icon>
    </div>

    <div class="alert-content">

        <div class="alert-title">
            {{ title }} — {{ exercise }}
        </div>

        <div class="alert-desc">
            {{ description }}
        </div>

    </div>

    <button
        class="alert-btn"
        matRipple
        (click)="onApply()">
        {{ buttonLabel }}
    </button>

</div>

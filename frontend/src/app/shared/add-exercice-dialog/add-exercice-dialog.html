<h2 mat-dialog-title>

    Ajouter un exercice

</h2>

<mat-dialog-content>

    <mat-form-field appearance="outline">

        <mat-label>

            Nom de l'exercice

        </mat-label>

        <input
            matInput
            [(ngModel)]="exerciseName">

    </mat-form-field>

</mat-dialog-content>

<mat-dialog-actions align="end">

    <button
        mat-button
        (click)="cancel()">

        Annuler

    </button>

    <button
        mat-flat-button
        color="primary"
        (click)="save()">

        Ajouter

    </button>

</mat-dialog-actions>

<div class="auth">

  <!-- Logo -->
  <div class="auth__header">

    <div class="auth__badge">
      HPIS
    </div>

    <h1 class="auth__title">
      BON RETOUR
    </h1>

    <p class="auth__subtitle">
      Connectez-vous pour accéder à vos données de performance.
    </p>

  </div>

  <!-- Formulaire -->

  <form
    class="auth__form"
    [formGroup]="form"
    (ngSubmit)="submit()">

    <!-- Email -->

    <div class="field">

      <label
        class="field__label"
        for="email">
        Adresse e-mail
      </label>

      <div
        class="field__control"
        [class.field__control--invalid]="email.invalid && email.touched">

        <input
          id="email"
          class="field__input"
          type="email"
          formControlName="email"
          placeholder="nom@exemple.com">

      </div>

      @if(email.invalid && email.touched){

      <span class="field__error">
        Adresse e-mail invalide.
      </span>

      }

    </div>

    <!-- Password -->

    <div class="field">

      <div class="field__header">

        <label
          class="field__label"
          for="password">
          Mot de passe
        </label>

        <button
          class="link"
          type="button"
          (click)="forgotPassword.emit()">

          Mot de passe oublié ?

        </button>

      </div>

      <div
        class="field__control"
        [class.field__control--invalid]="password.invalid && password.touched">

        <input
          id="password"
          class="field__input"
          [type]="showPassword ? 'text' : 'password'"
          formControlName="password"
          placeholder="••••••••">

        <button
          class="field__toggle"
          type="button"
          (click)="togglePassword()">

          @if(showPassword){

            oo

          } @else {
            

            

          }

        </button>

      </div>

      @if(password.invalid && password.touched){

      <span class="field__error">
        Minimum 6 caractères.
      </span>

      }

    </div>

    <!-- Remember -->

    <label class="checkbox">

      <input
        class="checkbox__input"
        type="checkbox"
        formControlName="rememberMe">

      <span class="checkbox__box"></span>

      <span class="checkbox__label">

        Rester connecté

      </span>

    </label>

    <!-- Login -->

    <button
      class="btn btn--primary"
      type="submit"
      [disabled]="form.invalid">

      Se connecter

    </button>

  </form>

  <!-- Divider -->

  <div class="divider">

    <span>ou</span>

  </div>

  <!-- Google -->

  <button
    class="btn btn--google"
    type="button"
    (click)="googleLogin.emit()">

    <svg
      class="btn__google-icon"
      width="18"
      height="18"
      viewBox="0 0 18 18">

      <path fill="#4285F4"
      d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844a4.14 4.14 0 0 1-1.796 2.716v2.259h2.908c1.702-1.567 2.684-3.875 2.684-6.615z"/>

      <path fill="#34A853"
      d="M9 18c2.43 0 4.467-.806 5.956-2.18l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 0 0 9 18z"/>

      <path fill="#FBBC05"
      d="M3.964 10.71A5.41 5.41 0 0 1 3.682 9c0-.593.102-1.17.282-1.71V4.958H.957A8.996 8.996 0 0 0 0 9c0 1.452.348 2.827.957 4.042l3.007-2.332z"/>

      <path fill="#EA4335"
      d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 0 0 .957 4.958L3.964 7.29C4.672 5.163 6.656 3.58 9 3.58z"/>

    </svg>

    Continuer avec Google

  </button>

  <!-- Footer -->

  <p class="auth__footer">

    Vous n'avez pas de compte ?

    <button
      class="link link--strong"
      type="button"
      (click)="createAccount.emit()">

      Créer un compte

    </button>

  </p>

</div>
